name: Daily Brief

on:
  schedule:
    - cron: '0 12 * * *'  # Daily 7am ET (UTC-5 EST / UTC-4 EDT)
  workflow_dispatch:        # Manual trigger from GitHub UI
    inputs:
      window:
        description: 'Time window to scrape (e.g. 24h, 48h, 7d)'
        required: false
        default: '24h'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Install dependencies
        run: npm install
        working-directory: daily-brief

      - name: Write config from secret
        run: echo '${{ secrets.DAILY_BRIEF_CONFIG }}' > config.json
        working-directory: daily-brief

      - name: Run scraper
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run scrape -- --window=${{ github.event.inputs.window || '24h' }}
        working-directory: daily-brief

      - name: Upload brief as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brief-${{ github.run_id }}
          path: daily-brief/briefs/
          retention-days: 30
